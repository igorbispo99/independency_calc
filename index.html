<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Independência Financeira</title>
  
  <!-- Carregando React e ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Carregando Babel para compilar JSX no navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Carregando Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // Ícones SVG inline para não depender de pacotes externos
    const Target = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
      </svg>
    );

    const Clock = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
    );

    const TrendingUp = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>
      </svg>
    );

    const Info = ({ className }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
      </svg>
    );

    function App() {
      // Estados para os parâmetros
      const [activeIncome, setActiveIncome] = useState(10000);
      const [savingsRate, setSavingsRate] = useState(20);
      const [cdiRate, setCdiRate] = useState(10.5);
      const [inflationRate, setInflationRate] = useState(4.5);

      // Cálculos principais
      const results = useMemo(() => {
        if (savingsRate <= 0 || cdiRate <= 0 || activeIncome <= 0) {
          return { months: 0, data: [], maxMonths: 0, isPossible: false, error: "Insira valores válidos maiores que zero." };
        }

        const realAnnualRate = (1 + cdiRate / 100) / (1 + inflationRate / 100) - 1;
        
        if (realAnnualRate <= 0) {
           return { months: 0, data: [], maxMonths: 0, isPossible: false, error: "A inflação está maior ou igual ao CDI." };
        }

        const realMonthlyRate = Math.pow(1 + realAnnualRate, 1 / 12) - 1;
        const monthlySavings = activeIncome * (savingsRate / 100);

        let currentMonths = 0;
        let patrimony = 0;
        let passiveIncome = 0;
        const dataPoints = [];
        
        const MAX_MONTHS = 1800;

        dataPoints.push({ month: 0, passiveIncome: 0 });

        while (passiveIncome < activeIncome && currentMonths < MAX_MONTHS) {
          currentMonths++;
          patrimony += monthlySavings;
          patrimony *= (1 + realMonthlyRate);
          passiveIncome = patrimony * realMonthlyRate;

          if (currentMonths % 6 === 0 || passiveIncome >= activeIncome) {
            dataPoints.push({
              month: currentMonths,
              passiveIncome: passiveIncome,
              patrimony: patrimony
            });
          }
        }

        const extraMonths = Math.floor(currentMonths * 0.15);
        for (let i = 1; i <= extraMonths; i++) {
          patrimony += monthlySavings;
          patrimony *= (1 + realMonthlyRate);
          const futurePassiveIncome = patrimony * realMonthlyRate;
          if (i % 6 === 0 || i === extraMonths) {
            dataPoints.push({
              month: currentMonths + i,
              passiveIncome: futurePassiveIncome,
              patrimony: patrimony
            });
          }
        }

        return {
          months: currentMonths,
          years: Math.floor(currentMonths / 12),
          remainingMonths: currentMonths % 12,
          data: dataPoints,
          maxMonths: currentMonths + extraMonths,
          finalPatrimony: patrimony,
          isPossible: currentMonths < MAX_MONTHS
        };
      }, [activeIncome, savingsRate, cdiRate, inflationRate]);

      const formatCurrency = (value) => {
        return new Intl.NumberFormat('pt-BR', {
          style: 'currency',
          currency: 'BRL',
          maximumFractionDigits: 0,
        }).format(value);
      };

      const renderChart = () => {
        if (!results.isPossible || results.data.length === 0) return null;

        const width = 800;
        const height = 300;
        const padding = { top: 20, right: 20, bottom: 40, left: 80 };
        
        const chartWidth = width - padding.left - padding.right;
        const chartHeight = height - padding.top - padding.bottom;

        const maxX = Math.max(results.maxMonths, 1);
        const maxY = Math.max(activeIncome * 1.3, 1);

        const getX = (month) => padding.left + (month / maxX) * chartWidth;
        const getY = (val) => padding.top + chartHeight - (val / maxY) * chartHeight;

        const passivePath = results.data.map((d, i) => {
          return `${i === 0 ? 'M' : 'L'} ${getX(d.month)} ${getY(d.passiveIncome)}`;
        }).join(' ');

        const areaPath = `${passivePath} L ${getX(results.data[results.data.length - 1].month)} ${getY(0)} L ${getX(0)} ${getY(0)} Z`;

        const crossoverX = getX(results.months);
        const activeIncomeY = getY(activeIncome);

        const maxYears = Math.ceil(maxX / 12);
        const labelStep = Math.max(1, Math.ceil(maxYears / 8));

        return (
          <div className="overflow-x-auto w-full">
            <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto min-w-[600px]">
              <line x1={padding.left} y1={padding.top + chartHeight} x2={width - padding.right} y2={padding.top + chartHeight} stroke="#94a3b8" strokeWidth="1" />
              <line x1={padding.left} y1={padding.top} x2={padding.left} y2={padding.top + chartHeight} stroke="#94a3b8" strokeWidth="1" />

              {[0, 0.5, 1, 1.3].map((factor) => {
                const yVal = activeIncome * factor;
                const yPos = getY(yVal);
                return (
                  <g key={factor}>
                    <line x1={padding.left} y1={yPos} x2={width - padding.right} y2={yPos} stroke="#e2e8f0" strokeDasharray="4,4" />
                    <text x={padding.left - 10} y={yPos + 4} textAnchor="end" fontSize="12" fill="#64748b">
                      {formatCurrency(yVal)}
                    </text>
                  </g>
                );
              })}

              {Array.from({ length: maxYears + 1 }).map((_, i) => {
                if (i % labelStep !== 0) return null; 
                const xPos = getX(i * 12);
                return (
                  <g key={i}>
                    <line x1={xPos} y1={padding.top + chartHeight} x2={xPos} y2={padding.top + chartHeight + 5} stroke="#94a3b8" />
                    <text x={xPos} y={padding.top + chartHeight + 20} textAnchor="middle" fontSize="12" fill="#64748b">
                      Ano {i}
                    </text>
                  </g>
                );
              })}

              <defs>
                <linearGradient id="passiveGradient" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#10b981" stopOpacity="0.3" />
                  <stop offset="100%" stopColor="#10b981" stopOpacity="0.0" />
                </linearGradient>
              </defs>
              <path d={areaPath} fill="url(#passiveGradient)" />
              <path d={passivePath} fill="none" stroke="#10b981" strokeWidth="3" strokeLinecap="round" />

              <line x1={padding.left} y1={activeIncomeY} x2={width - padding.right} y2={activeIncomeY} stroke="#3b82f6" strokeWidth="2" strokeDasharray="6,4" />
              <text x={width - padding.right} y={activeIncomeY - 8} textAnchor="end" fontSize="12" fill="#3b82f6" fontWeight="bold">
                Renda Ativa (Alvo)
              </text>

              {results.months > 0 && results.months < results.maxMonths && (
                <g>
                  <line x1={crossoverX} y1={padding.top} x2={crossoverX} y2={padding.top + chartHeight} stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="4,4" />
                  <circle cx={crossoverX} cy={activeIncomeY} r="6" fill="#f59e0b" />
                  <rect x={crossoverX - 60} y={padding.top - 15} width="120" height="24" rx="4" fill="#f59e0b" />
                  <text x={crossoverX} y={padding.top + 2} textAnchor="middle" fontSize="12" fill="white" fontWeight="bold">
                    Independência!
                  </text>
                </g>
              )}
            </svg>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 p-4 md:p-8 text-slate-800 font-sans">
          <div className="max-w-5xl mx-auto space-y-6">
            
            <div className="text-center space-y-2 mb-8">
              <h1 className="text-3xl md:text-4xl font-bold text-slate-900 tracking-tight">
                Simulador de Independência Financeira
              </h1>
              <p className="text-slate-600 max-w-2xl mx-auto">
                Descubra em quanto tempo os rendimentos dos seus investimentos (Renda Passiva) 
                vão se igualar ao seu salário atual (Renda Ativa).
              </p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
              
              <div className="lg:col-span-1 bg-white rounded-2xl p-6 shadow-sm border border-slate-200 space-y-6">
                <h2 className="text-lg font-semibold flex items-center gap-2 mb-4">
                  <Target className="w-5 h-5 text-blue-500" />
                  Seus Parâmetros
                </h2>

                <div className="space-y-2">
                  <label className="text-sm font-medium text-slate-700 block">
                    Renda Ativa Mensal (R$)
                  </label>
                  <div className="relative">
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500">R$</span>
                    <input 
                      type="number" 
                      value={activeIncome}
                      onChange={(e) => setActiveIncome(Number(e.target.value))}
                      className="w-full pl-10 pr-4 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors"
                    />
                  </div>
                </div>

                <div className="space-y-3 bg-blue-50/50 p-4 rounded-xl border border-blue-100">
                  <div className="flex justify-between items-center">
                    <label className="text-sm font-semibold text-blue-900">
                      Taxa de Poupança (% guardado)
                    </label>
                    <span className="text-lg font-bold text-blue-600">{savingsRate}%</span>
                  </div>
                  <input 
                    type="range" 
                    min="1" 
                    max="100" 
                    value={savingsRate}
                    onChange={(e) => setSavingsRate(Number(e.target.value))}
                    className="w-full h-2 bg-blue-200 rounded-lg appearance-none cursor-pointer accent-blue-600"
                  />
                  <p className="text-xs text-blue-700 text-right">
                    Você guarda {formatCurrency(activeIncome * (savingsRate/100))} por mês.
                  </p>
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <div className="space-y-2">
                    <label className="text-sm font-medium text-slate-700 block text-center">
                      CDI Anual (%)
                    </label>
                    <input 
                      type="number" 
                      step="0.1"
                      value={cdiRate}
                      onChange={(e) => setCdiRate(Number(e.target.value))}
                      className="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-center"
                    />
                  </div>

                  <div className="space-y-2">
                    <label className="text-sm font-medium text-slate-700 block text-center">
                      Inflação Anual (%)
                    </label>
                    <input 
                      type="number" 
                      step="0.1"
                      value={inflationRate}
                      onChange={(e) => setInflationRate(Number(e.target.value))}
                      className="w-full px-3 py-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 text-center"
                    />
                  </div>
                </div>

                <div className="bg-slate-50 p-3 rounded-lg flex gap-2 items-start">
                  <Info className="w-4 h-4 text-slate-500 mt-0.5 shrink-0" />
                  <p className="text-xs text-slate-600">
                    O cálculo usa a <strong>Taxa Real</strong> (CDI descontado da Inflação) para garantir que sua renda passiva mantenha o poder de compra no futuro.
                  </p>
                </div>
              </div>

              <div className="lg:col-span-2 space-y-6">
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex items-center gap-4">
                    <div className="p-4 bg-emerald-100 rounded-full text-emerald-600">
                      <Clock className="w-8 h-8" />
                    </div>
                    <div>
                      <p className="text-sm font-medium text-slate-500 uppercase tracking-wider">Tempo Necessário</p>
                      {results.isPossible ? (
                        <div className="text-2xl font-bold text-slate-800">
                          {results.years > 0 && <span>{results.years} anos</span>}
                          {results.years > 0 && results.remainingMonths > 0 && <span> e </span>}
                          {results.remainingMonths > 0 && <span>{results.remainingMonths} meses</span>}
                          {results.years === 0 && results.remainingMonths === 0 && <span>Imediato</span>}
                        </div>
                      ) : (
                        <div className="text-lg font-bold text-red-500 text-sm">
                          {results.error || "Mais de 150 anos"}
                        </div>
                      )}
                    </div>
                  </div>

                  <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex items-center gap-4">
                    <div className="p-4 bg-blue-100 rounded-full text-blue-600">
                      <TrendingUp className="w-8 h-8" />
                    </div>
                    <div>
                      <p className="text-sm font-medium text-slate-500 uppercase tracking-wider">Patrimônio Alvo Acumulado</p>
                      <div className="text-2xl font-bold text-slate-800">
                        {results.isPossible ? formatCurrency(results.finalPatrimony) : "---"}
                      </div>
                    </div>
                  </div>
                </div>

                <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200">
                  <h3 className="text-lg font-semibold text-slate-800 mb-6">Evolução da Renda Passiva Mensal</h3>
                  {renderChart()}
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Renderiza a aplicação
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
